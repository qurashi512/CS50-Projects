{% extends "layout.html" %}

{% block title %}Add Cash{% endblock %}

{% block main %}
<form action="/add_cash" method="post">
    <div class="mb-3">
        <input autocomplete="off" autofocus class="form-control mx-auto w-auto"
               name="amount" placeholder="Amount ($)" type="number"
               min="1" step="0.01">
    </div>
    <button class="btn btn-success" type="submit">💵 Add Cash</button>
</form>
{% endblock %}
